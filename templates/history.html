<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ static_version }}">
    <style>
        .dashboard-stats {
            display: flex;
            gap: 10px;
            padding: 10px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 120px;
            background: linear-gradient(135deg, var(--blue), #0369a1);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.3);
        }

        .stat-card.danger {
            background: linear-gradient(135deg, #ef4444, #991b1b);
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 28px;
        }

        .stat-card p {
            margin: 5px 0 0;
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .hist-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
        }

        .hist-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .hist-header {
            padding: 12px 15px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hist-date {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hist-count {
            background: #fee2e2;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .hist-count.safe {
            background: #dcfce7;
            color: #22c55e;
        }

        .hist-count.warn {
            background: #fef3c7;
            color: #d97706;
        }

        .hist-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hist-body i {
            font-size: 40px;
            color: #e2e8f0;
            margin-bottom: 10px;
        }

        .hist-map-mini {
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            margin-bottom: 10px;
            width: 100%;
        }

        .hist-actions {
            display: flex;
            border-top: 1px solid #e2e8f0;
        }

        .hist-actions button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }

        .hist-actions .btn-detail {
            color: var(--blue);
        }

        .hist-actions .btn-detail:hover {
            background: #eff6ff;
        }

        .hist-actions .btn-del {
            color: #ef4444;
            border-left: 1px solid #e2e8f0;
        }

        .hist-actions .btn-del:hover {
            background: #fef2f2;
        }
    </style>
</head>

<body>
    <div id="main-view" class="app-shell" style="max-width: 1200px; margin: 0 auto;">
        <div class="header">
            <div class="brand">
                <button class="icon-btn" onclick="window.location.href='/'"><i
                        class="fa-solid fa-arrow-left"></i></button>
                <h1>Scan History Dashboard</h1>
            </div>
            <div class="nav-icons">
                <button class="icon-btn" onclick="window.location.href='/'"><i class="fa-solid fa-house"></i></button>
                <button class="icon-btn" onclick="window.location.href='/history'"><i
                        class="fa-solid fa-clock-rotate-left"></i></button>
            </div>
        </div>

        <div class="dashboard-stats" id="dash-stats">
            <!-- Stats will load here -->
        </div>

        <div
            style="padding: 0 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 18px; color: #0f172a;">Your Previous Scans</h2>
            <div>
                <button class="btn btn-outline"
                    style="color:red; border-color:red; padding: 6px 12px; font-size: 12px; margin: 0;"
                    onclick="if(confirm('Clear all history?')) { localStorage.clear(); location.reload(); }"><i
                        class="fa-solid fa-trash-can"></i> Clear All</button>
            </div>
        </div>

        <div class="history-grid" id="list">
            <!-- Grid items will load here -->
        </div>

        <div style="text-align: center; padding: 30px; display: none;" id="empty-state">
            <i class="fa-solid fa-folder-open" style="font-size: 48px; color: #cbd5e1; margin-bottom: 15px;"></i>
            <h3 style="margin:0; color:#475569;">No History Found</h3>
            <p style="color:#64748b; font-size: 14px;">Your scanned results will appear here.</p>
            <button class="btn btn-blue" style="margin-top:20px; max-width: 200px; width: 100%;"
                onclick="window.location.href='/'">Go Scan Now</button>
        </div>
    </div>

    <script>
        window.originalMainHTML = document.getElementById('main-view') ? document.getElementById('main-view').innerHTML : '';
        history.replaceState({ view: 'list' }, "Dashboard", "");
        window.addEventListener('popstate', function (event) {
            const s = event.state;
            if (s && s.view === 'detail') {
                _renderDetail(s.id);
            } else {
                if (document.getElementById('main-view')) document.getElementById('main-view').innerHTML = window.originalMainHTML;
                loadList();
            }
        });
        function loadList() {
            const h = JSON.parse(localStorage.getItem('pothole_history') || '[]');
            const list = document.getElementById('list');
            const emptyState = document.getElementById('empty-state');
            if (!list || !emptyState) return;

            // Calculate stats
            let totalPotholes = 0;
            h.forEach(item => {
                totalPotholes += (parseInt(item.potholes) || 0);
            });

            document.getElementById('dash-stats').innerHTML = `
        <div class="stat-card">
            <h3>${h.length}</h3>
            <p>Total Scans</p>
        </div>
        <div class="stat-card danger">
            <h3>${totalPotholes}</h3>
            <p>Potholes Found</p>
        </div>
    `;
            if (h.length === 0) {
                list.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            list.style.display = 'grid';
            emptyState.style.display = 'none';
            list.innerHTML = h.map((item, i) => {
                const count = parseInt(item.potholes) || 0;
                let countClass = 'warn'; let icon = 'fa-exclamation-circle';
                if (count === 0) { countClass = 'safe'; icon = 'fa-check-circle'; }
                else if (count >= 5) { countClass = ''; icon = 'fa-burst'; }

                let mapPreview = '';
                if (item.lat && item.lon) {
                    mapPreview = `<div class="hist-map-mini"><iframe width="100%" height="100%" style="border:none; pointer-events:none;" src="https://maps.google.com/maps?q=${item.lat},${item.lon}&z=13&output=embed"></iframe></div>`;
                } else if (item.images && item.images.length > 0) {
                    mapPreview = `<div class="hist-map-mini"><img src="${item.images[0]}" style="width:100%; height:100%; object-fit:cover;"></div>`;
                }
                return `
        <div class="hist-card">
            <div class="hist-header">
                <div class="hist-date"><i class="fa-regular fa-clock"></i> ${item.date ? item.date.split(',')[0] : 'Unknown'}</div>
                <div class="hist-count ${countClass}"><i class="fa-solid ${icon}"></i> ${count} Found</div>
            </div>
            <div class="hist-body">
                ${mapPreview}
                <p style="margin:0; font-size: 14px; color: #475569; font-weight: 500;">
                    ${item.address ? `<i class="fa-solid fa-location-dot" style="color:var(--blue); margin-right:5px;"></i> ${item.address}` : 'Location Not Provided'}
                </p>
            </div>
            <div class="hist-actions">
                <button class="btn-detail" onclick="showDetail(${i})"><i class="fa-solid fa-expand" style="margin-right:5px;"></i> View Details</button>
                <button class="btn-del" onclick="deleteItem(${i})"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
        </div>
    `}).join('');
        }
        function deleteItem(i) {
            if (!confirm('Delete this record?')) return;
            let h = JSON.parse(localStorage.getItem('pothole_history'));
            h.splice(i, 1); localStorage.setItem('pothole_history', JSON.stringify(h)); loadList();
        }
        function showDetail(i) {
            history.pushState({ view: 'detail', id: i }, "Report Detail", "#detail");
            _renderDetail(i);
        }
        function _renderDetail(i) {
            const item = JSON.parse(localStorage.getItem('pothole_history'))[i];
            const hasLoc = item.lat != null && item.lon != null && item.lat !== '' && item.lon !== '';
            const mapHtml = hasLoc ? `<div style="flex-grow:1; display:flex; flex-direction:column;"><iframe style="border-radius:15px; border:none; width:100%; height:100%; flex-grow:1; min-height:180px;" src="https://maps.google.com/maps?q=${item.lat},${item.lon}&z=15&output=embed" title="Map"></iframe></div>` : '<p style="font-size:12px; color:#64748b; padding:20px; background:#f8fafc; border-radius:15px; text-align:center;">📍 Location not available.</p>';

            document.getElementById('main-view').innerHTML = `
        <div class="header">
            <div class="brand">
                <button onclick="history.back()" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <h1>Scan Report Details</h1>
            </div>
            <div class="nav-icons">
                <button class="icon-btn" onclick="window.location.href='/'"><i class="fa-solid fa-house"></i></button>
                <button class="icon-btn" onclick="window.location.href='/history'"><i class="fa-solid fa-clock-rotate-left"></i></button>
            </div>
        </div>
        <div class="desktop-split">
            <div class="card" style="text-align:center; display: flex; flex-direction: column;">
                <h1 style="font-size: 50px; color: var(--blue); margin: 0;">${item.potholes}</h1>
                <p style="font-weight: 600; font-size: 18px; margin-top: 5px; color: #0f172a;">Potholes Detected</p>
                <p style="color: #64748b; font-size: 13px; margin-bottom: 15px;"><i class="fa-regular fa-clock"></i> ${item.date}</p>
                ${mapHtml}
            </div>
            <div class="card" style="display:flex; flex-direction:column;">
                <h3 style="margin: 0 0 15px 0; font-size: 16px;"><i class="fa-solid fa-camera" style="color:var(--blue); margin-right:8px;"></i>Evidence Photos</h3>
                <div class="image-grid" style="flex-grow:1; align-content:start;">${item.images.map((img, imgIdx) => `
                    <div id="hist-img-${i}-${imgIdx}" style="position:relative; aspect-ratio:1; border-radius:12px; overflow:hidden; border: 1px solid #e2e8f0;">
                        <img src="${img}" style="width:100%; height:100%; object-fit:cover;">
                        <button class="thumb-remove" onclick="removeHistImage(${i}, ${imgIdx})" title="Remove"><i class="fa-solid fa-xmark"></i></button>
                        <a href="${img}" download="${img.split('/').pop()}" class="thumb-download" title="Download"><i class="fa-solid fa-download"></i></a>
                    </div>
                `).join('')}</div>
            </div>
        </div>
        <div style="position: sticky; bottom: 0; padding: 20px; padding-top: 40px; background: linear-gradient(transparent, rgba(255,255,255,0.9) 30%, #ffffff); z-index: 100; margin-top: auto; border-radius: 0 0 0 0; width: 100%;">
            ${item.potholes > 0 ? `<button class="btn btn-blue" onclick='lodge(${i})' style="margin:0; width:100%; border-radius: 20px; font-size: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);"><i class="fa-solid fa-paper-plane" style="margin-right:8px;"></i> Submit Official Report</button>` : `<p style="color:var(--red); font-size:14px; text-align:center; margin: 0;">✅ No potholes detected. Report not needed.</p>`}
        </div>`;
        }
        function removeHistImage(i, imgIdx) {
            let h = JSON.parse(localStorage.getItem('pothole_history'));
            if (h[i]) {
                let pCount = 0;
                if (h[i].images_data && h[i].images_data[imgIdx]) {
                    pCount = h[i].images_data[imgIdx].potholes;
                } else {
                    pCount = h[i].images.length > 0 ? Math.round(h[i].potholes / h[i].images.length) : 0;
                }

                h[i].images.splice(imgIdx, 1);
                if (h[i].images_data) h[i].images_data.splice(imgIdx, 1);
                h[i].potholes = Math.max(0, h[i].potholes - pCount);
                localStorage.setItem('pothole_history', JSON.stringify(h));

                const el = document.getElementById(`hist-img-${i}-${imgIdx}`);
                if (el) el.style.display = 'none';

                let pc = document.querySelector('h1[style*="font-size: 50px"]');
                if (pc) {
                    pc.innerText = h[i].potholes;
                }

                if (i === 0) {
                    sessionStorage.setItem('last_result_item', JSON.stringify(h[0]));
                }
            }
        }
        function lodge(i) {
            const h = JSON.parse(localStorage.getItem('pothole_history') || '[]');
            const item = h[i];
            if (!item) return;
            sessionStorage.setItem('current_complaint', JSON.stringify({ ...item, all_images: item.images.map(url => url.split('/').pop()) }));
            window.location.href = '/complaint';
        }
        loadList();
    </script>
</body>

</html>
